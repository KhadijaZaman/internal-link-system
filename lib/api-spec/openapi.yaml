        items:
          type: array
          # Items vary by audit type (orphans / over_linked / broken_links).
          # Over-linked target items include `contentCount` (body inbound,
          # the figure checked against the threshold) and `chromeCount`
          # (nav + header + footer inbound, reported for context only).
          items:
            type: object
            additionalProperties: true
    PruningSuggestion:
      type: object
      required: [url, bestPosition, queriesInTop3, totalImpressions, totalClicks, daysObserved, topQueries]
      properties:
        url: { type: string }
        title: { type: ["string", "null"] }
        bestPosition: { type: number }
        queriesInTop3: { type: integer }
        totalImpressions: { type: integer }
        totalClicks: { type: integer }
        daysObserved: { type: integer }
        topQueries:
          type: array
          items: { type: string }
        # --- Intent-aware fields (added 2026-05) ---
        # On-intent vs off-intent classification of every top-3 query the page
        # ranks for, computed as cosine similarity between the query embedding
        # and the page embedding. Pages whose top-3 rankings are mostly
        # off-intent (e.g. a tools page accidentally ranking for a competitor
        # brand name) are NOT pruning candidates — the off-intent queries are
        # irrelevant noise.
        onIntentQueries: { type: integer }
        offIntentQueries: { type: integer }
        # Sum of monthly search volume across on-intent top-3 queries. Lets
        # the operator distinguish "0 clicks because no demand" from "0
        # clicks despite real demand". Null when DataForSEO is unavailable.
        onIntentVolume: { type: ["integer", "null"] }
        # Plain-language verdict the UI renders directly.
        intentVerdict:
          type: string
          enum: [on_intent_no_clicks, off_intent_only, mixed, unknown]
        # Per-query detail for the operator's manual review.
        queryDetails:
          type: array
          items: { $ref: "#/components/schemas/PruningQueryDetail" }
    PruningQueryDetail:
      type: object
      required: [query, intent]
      properties:
        query: { type: string }
        # Best (lowest) position the page reached for this query in the window.
        bestPosition: { type: ["number", "null"] }
        impressions: { type: integer }
        clicks: { type: integer }
        # Cosine similarity between query embedding and page embedding,
        # 0..1. Null when an embedding is missing on either side.
        similarity: { type: ["number", "null"] }
        intent:
          type: string
          enum: [on, off, unknown]
        # Monthly search volume from DataForSEO. Null when unavailable.
        searchVolume: { type: ["integer", "null"] }
    PruningReport:
      type: object
      required: [runAt, totalDays, itemCount, items]
      properties:
        runAt: { type: ["string", "null"], format: date-time }
        windowStart: { type: ["string", "null"], format: date }
        windowEnd: { type: ["string", "null"], format: date }
