openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Wellows internal linking system API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Admin authentication
  - name: dashboard
    description: Dashboard summary data
  - name: graph
    description: Link graph data
  - name: inventory
    description: Page inventory
  - name: suggestions
    description: Link suggestions inbox
  - name: losers
    description: Query loser tracker
  - name: optimize
    description: URL optimizer queue
  - name: jobs
    description: Background job manual triggers
  - name: gsc
    description: Google Search Console analytics
  - name: ga4
    description: Google Analytics 4 page engagement
  - name: report
    description: Combined per-page GSC + GA4 performance report
  - name: gscChat
    description: Prompt-based GSC analysis
  - name: wp
    description: WordPress crawler classifications and exclude list
  - name: audits
    description: Weekly audit reports (orphans, over-linked, broken links)
  - name: linking
    description: Semantic linking engine settings
  - name: linkLookups
    description: On-demand internal link suggestions for arbitrary URLs / topics
  - name: content
    description: Content Writer & Auditor (SemanticsX-style) — research, write, audit
  - name: structural
    description: Structural quick wins — orphan and dead-end internal-link fixes
  - name: snapshot
    description: Site authority, health, and central-entity demand snapshot
  - name: kb
    description: Knowledge base documents used to ground optimization briefs
  - name: actions
    description: Prioritized action queue — one ranked "do this next" list
  - name: impact
    description: Before/after search impact of completed work, from GSC snapshots
  - name: digests
    description: Weekly digest — what happened, what got done, what improved
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid password
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/me:
    get:
      operationId: getSession
      tags: [auth]
      summary: Current session
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard KPIs and last-run timestamps
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /dashboard/urls/{type}:
    get:
      operationId: getDashboardUrls
      tags: [dashboard]
      summary: URLs behind a dashboard KPI card
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [pages, links, orphans, dead-ends, pending-suggestions, critical-losers]
      responses:
        "200":
          description: List of URLs (capped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardUrlList"
  /link-graph:
    get:
      operationId: getLinkGraph
      tags: [graph]
      summary: Force-directed graph data
      responses:
        "200":
          description: Graph payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkGraph"
  /link-graph/focus:
    get:
      operationId: getLinkGraphFocus
      tags: [graph]
      summary: Focused subgraph for a single URL with scored neighbors and recommendations
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Focus payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkGraphFocus"
        "404":
          description: URL not found
  /knowledge-graph:
    get:
      operationId: getKnowledgeGraph
      tags: [graph]
      summary: Topical knowledge graph — pages clustered by topic with link and semantic-similarity edges
      responses:
        "200":
          description: Knowledge graph payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeGraph"
  /inventory:
    get:
      operationId: getInventoryPage
      tags: [inventory]
      summary: Detail for a single inventory URL
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Page detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryPageDetail"
        "404":
          description: Not found
  /suggestions:
    get:
      operationId: listSuggestions
      tags: [suggestions]
      summary: List link suggestions
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending_review, approved, rejected, inserted, all]
      responses:
        "200":
          description: Suggestion list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkSuggestion"
  /suggestions/{id}/action:
    post:
      operationId: actSuggestion
      tags: [suggestions]
      summary: Approve, reject, or mark inserted
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestionActionInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkSuggestion"
  /link-lookups:
    get:
      operationId: listLinkLookups
      tags: [linkLookups]
      summary: List recent on-demand link lookups
      responses:
        "200":
          description: Lookup list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkLookup"
    post:
      operationId: createLinkLookups
      tags: [linkLookups]
      summary: Create one or more link-lookup jobs (URL, bulk URLs, or free text)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkLookupCreateInput"
      responses:
        "202":
          description: Lookups created (results processed asynchronously)
          content:
            application/json:
              schema:
                type: object
                required: [ids]
                properties:
                  ids:
                    type: array
                    items: { type: integer }
  /link-lookups/{id}:
    get:
      operationId: getLinkLookup
      tags: [linkLookups]
      summary: Get one link lookup with full results
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Lookup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkLookup"
        "404":
          description: Not found
    delete:
      operationId: deleteLinkLookup
      tags: [linkLookups]
      summary: Delete a link lookup
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /losers:
    get:
      operationId: listLosers
      tags: [losers]
      summary: Query losers grouped by severity for the latest week
      responses:
        "200":
          description: Loser groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoserWeek"
  /losers/query-insights:
    get:
      operationId: getQueryInsights
      tags: [losers]
      summary: GSC performance + AI strategy summary for a single search query
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 2, maxLength: 200 }
      responses:
        "200":
          description: Query insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryInsights"
  /losers/{id}/send-to-optimizer:
    post:
      operationId: sendLoserToOptimizer
      tags: [losers]
      summary: Add loser's URL to the optimizer queue
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizeQueueItem"
  /optimize-queue:
    get:
      operationId: listOptimizeQueue
      tags: [optimize]
      summary: List optimizer queue items
      responses:
        "200":
          description: Queue list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptimizeQueueItem"
    post:
      operationId: addOptimizeQueueItem
      tags: [optimize]
      summary: Add a URL to the optimizer queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizeQueueInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizeQueueItem"
  /optimize-queue/{id}/run:
    post:
      operationId: runOptimizeItem
      tags: [optimize]
      summary: Run the optimize brief generation for a single queue item immediately (background)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "202":
          description: Started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizeQueueItem"
  /optimize-queue/{id}/requeue:
    post:
      operationId: requeueOptimizeItem
      tags: [optimize]
      summary: Set status back to optimize
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Requeued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizeQueueItem"
  /tracked-submissions:
    get:
      operationId: listTrackedSubmissions
      tags: [trackedSubmissions]
      summary: List custom tracked submissions
      responses:
        "200":
          description: Tracked submissions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackedSubmission"
    post:
      operationId: createTrackedSubmissions
      tags: [trackedSubmissions]
      summary: Add one or more URLs to the custom tracking list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackedSubmissionCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackedSubmission"
  /tracked-submissions/{id}:
    patch:
      operationId: updateTrackedSubmission
      tags: [trackedSubmissions]
      summary: Update a tracked submission's status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackedSubmissionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedSubmission"
        "404":
          description: Not found
    delete:
      operationId: deleteTrackedSubmission
      tags: [trackedSubmissions]
      summary: Delete a tracked submission
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /tracked-submissions/{id}/performance:
    get:
      operationId: getTrackedSubmissionPerformance
      tags: [trackedSubmissions]
      summary: GSC performance for a tracked URL and its target keyword
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: days
          required: false
          schema: { type: integer, minimum: 7, maximum: 180, default: 28 }
        - in: query
          name: country
          required: false
          description: ISO 3166-1 alpha-3 country code (e.g. usa, gbr, ind); omit for worldwide
          schema: { type: string, pattern: "^[A-Za-z]{3}$" }
      responses:
        "200":
          description: Daily keyword and page performance with previous-window comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedPerformance"
        "404":
          description: Not found
  /jobs/{jobName}/run:
    post:
      operationId: runJob
      tags: [jobs]
      summary: Manually trigger a background job
      parameters:
        - in: path
          name: jobName
          required: true
          schema:
            type: string
            enum: [crawl_link_map, gsc_inventory_and_losers, optimize_queued_urls, crawl_wordpress, reembed_wordpress, semantic_linking, audit_orphans, audit_over_linked, audit_broken_links, run_full_pipeline, recompute_action_queue, weekly_digest]
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRunResult"
        "409":
          description: Already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRunResult"
  /wp/classifications:
    get:
      operationId: listWpClassifications
      tags: [wp]
      summary: List page classifications
      responses:
        "200":
          description: Classifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WpClassificationList"
    patch:
      operationId: updateWpClassification
      tags: [wp]
      summary: Edit a classification (marks manuallyEdited)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WpClassificationPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /wp/exclude-list:
    get:
      operationId: listWpExcludeList
      tags: [wp]
      summary: List URL patterns excluded from link suggestions
      responses:
        "200":
          description: Exclude list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WpExcludeList"
    post:
      operationId: addWpExclude
      tags: [wp]
      summary: Add a URL pattern to the exclude list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WpExcludeCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WpExcludeItem"
        "409":
          description: Duplicate pattern
  /wp/exclude-list/{id}:
    delete:
      operationId: deleteWpExclude
      tags: [wp]
      summary: Remove a pattern from the exclude list
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /gsc/overview:
    get:
      operationId: getGscOverview
      tags: [gsc]
      summary: Headline metrics + timeseries with optional period compare
      parameters:
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
        - $ref: "#/components/parameters/Compare"
        - $ref: "#/components/parameters/UrlFilter"
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscOverview"
  /gsc/queries:
    get:
      operationId: getGscQueries
      tags: [gsc]
      summary: Top queries with optional branded split
      parameters:
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
        - $ref: "#/components/parameters/UrlFilter"
        - $ref: "#/components/parameters/RowLimit"
      responses:
        "200":
          description: Queries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscQueriesResponse"
  /gsc/pages:
    get:
      operationId: getGscPages
      tags: [gsc]
      summary: Top pages with click/impression metrics
      parameters:
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
        - $ref: "#/components/parameters/UrlFilter"
        - $ref: "#/components/parameters/RowLimit"
      responses:
        "200":
          description: Pages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscPagesResponse"
  /ga4/pages:
    get:
      operationId: getGa4Pages
      tags: [ga4]
      summary: Page-wise GA4 engagement (engagement rate, sessions, avg time)
      parameters:
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
      responses:
        "200":
          description: GA4 page engagement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ga4PagesResponse"
  /report/pages:
    get:
      operationId: getPagesReport
      tags: [report]
      summary: Combined per-page report — GSC position/impressions/clicks/queries + GA4 engagement
      parameters:
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
      responses:
        "200":
          description: Per-page combined GSC + GA4 report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageReportResponse"
  /gsc/geo:
    get:
      operationId: getGscGeo
      tags: [gsc]
      summary: Country and device breakdown
      parameters:
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
        - $ref: "#/components/parameters/UrlFilter"
      responses:
        "200":
          description: Geo + device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscGeoResponse"
  /gsc/indexing:
    get:
      operationId: getGscIndexing
      tags: [gsc]
      summary: Sitemap status and not-indexed pages
      responses:
        "200":
          description: Indexing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscIndexingResponse"
  /gsc/inspect:
    get:
      operationId: inspectGscUrl
      tags: [gsc]
      summary: GSC URL Inspection result for a single URL
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Inspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscInspectionResult"
  /gsc/cwv:
    get:
      operationId: getGscCwv
      tags: [gsc]
      summary: Core Web Vitals (from CrUX API)
      parameters:
        - $ref: "#/components/parameters/UrlFilter"
      responses:
        "200":
          description: CWV
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscCwvResponse"
  /gsc/links:
    get:
      operationId: getGscLinks
      tags: [gsc]
      summary: Top external linking domains and top internal target pages
      responses:
        "200":
          description: Links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscLinksResponse"
  /gsc/indexing/inspect-batch:
    post:
      operationId: inspectGscBatch
      tags: [gsc]
      summary: Inspect up to 10 URLs and bucket them by GSC coverage reason
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GscBatchInspectionRequest"
      responses:
        "200":
          description: Aggregated inspection results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscBatchInspectionResponse"
  /gsc/url-drilldown:
    get:
      operationId: getGscUrlDrilldown
      tags: [gsc]
      summary: Per-URL query mix and trend
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
      responses:
        "200":
          description: Per-URL detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscUrlDrilldown"
  /gsc/chat:
    post:
      operationId: askGsc
      tags: [gscChat]
      summary: Ask a question about the current GSC slice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GscChatRequest"
      responses:
        "200":
          description: Claude reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GscChatResponse"
  /gsc/chat/stream:
    post:
      operationId: askGscStream
      tags: [gscChat]
      summary: Stream a Claude reply for the current GSC slice via Server-Sent Events
      description: |
        Returns a `text/event-stream` with the following events:
        - `meta` — `{ contextSummary: string }` sent once at the start
        - `delta` — `{ text: string }` sent for each Claude text chunk
        - `done` — `{ ok: true }` sent on success
        - `error` — `{ error: string }` sent on failure

        The frontend consumes this with `fetch` + a `ReadableStream` reader rather than a generated hook.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GscChatRequest"
      responses:
        "200":
          description: SSE stream of Claude reply chunks
          content:
            text/event-stream:
              schema:
                type: string
  /audits/{type}:
    get:
      operationId: getAuditReport
      tags: [audits]
      summary: Latest audit report of the given type
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [orphans, over_linked, broken_links]
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditReport"
  /pruning-suggestions:
    get:
      operationId: getPruningSuggestions
      tags: [audits]
      summary: Pages that rank in the top 3 over the available window but generate zero clicks — pruning candidates
      responses:
        "200":
          description: Pruning report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PruningReport"
  /linking-settings:
    get:
      operationId: getLinkingSettings
      tags: [linking]
      summary: Read semantic linking engine settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkingSettings"
    put:
      operationId: updateLinkingSettings
      tags: [linking]
      summary: Update semantic linking engine settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkingSettingsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkingSettings"
  /jobs/status:
    get:
      operationId: getJobStatus
      tags: [jobs]
      summary: Job last-run and currently-running status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobStatus"
  /content/research:
    post:
      operationId: contentResearch
      tags: [content]
      summary: Run semantic research for a keyword (outlines, n-grams, entities, NLP, skip-grams, grammar)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContentResearchInput" }
      responses:
        "200":
          description: Research result
          content:
            application/json:
