      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
components:
  parameters:
    StartDate:
      in: query
      name: startDate
      required: true
      schema: { type: string, format: date }
    EndDate:
      in: query
      name: endDate
      required: true
      schema: { type: string, format: date }
    Compare:
      in: query
      name: compare
      schema: { type: boolean }
    UrlFilter:
      in: query
      name: url
      schema: { type: string }
    RowLimit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 5000 }
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    LoginInput:
      type: object
      required: [password]
      properties:
        password: { type: string, minLength: 1 }
    AuthSession:
      type: object
      required: [authenticated]
      properties:
        authenticated: { type: boolean }
        username: { type: ["string", "null"] }
    JobLastRun:
      type: object
      required: [name]
      properties:
        name: { type: string }
        lastRunAt: { type: ["string", "null"], format: date-time }
        lastStatus: { type: ["string", "null"] }
        lastDurationMs: { type: ["integer", "null"] }
        lastError: { type: ["string", "null"] }
    DashboardSummary:
      type: object
      required:
        - totalPages
        - totalLinks
        - orphanCount
        - deadEndCount
        - pendingSuggestionsCount
        - criticalLosersCount
        - sectionCounts
        - jobs
      properties:
        totalPages: { type: integer }
        totalLinks: { type: integer }
        orphanCount: { type: integer }
        deadEndCount: { type: integer }
        pendingSuggestionsCount: { type: integer }
        criticalLosersCount: { type: integer }
        sectionCounts:
          type: object
          required: [core, outer]
          properties:
            core: { type: integer }
            outer: { type: integer }
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/JobLastRun"
    ActionItem:
      type: object
      required:
        - id
        - actionType
        - targetUrl
        - score
        - impressionsAtStake
        - clicksAtStake
        - status
        - createdAt
      properties:
        id: { type: integer }
        actionType:
          type: string
          enum: [add_inbound_links, add_outbound_links, fix_losing_query, review_suggestions, optimize_content, improve_ctr, fix_cannibalization]
        targetUrl: { type: string }
        title: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        score: { type: number }
        impressionsAtStake: { type: integer }
        clicksAtStake: { type: integer }
        source:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [open, done, dismissed]
        resolution: { type: ["string", "null"], enum: [manual, auto, null] }
        createdAt: { type: string, format: date-time }
        completedAt: { type: ["string", "null"], format: date-time }
        dismissedAt: { type: ["string", "null"], format: date-time }
        lastSeenAt: { type: ["string", "null"], format: date-time }
    ActionQueue:
      type: object
      required: [generatedAt, counts, items]
      properties:
        generatedAt: { type: string, format: date-time }
        counts:
          type: object
          required: [open, done, dismissed]
          properties:
            open: { type: integer }
            done: { type: integer }
            dismissed: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActionItem"
    ActionStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [open, done, dismissed]
    HealthComponent:
      type: object
      required: [key, label, weight, penalty, deduction, raw, detail]
      properties:
        key:
          type: string
          enum: [orphans, dead_ends, losers, backlog, staleness]
        label: { type: string }
        weight: { type: number }
        penalty: { type: number }
        deduction: { type: number }
        raw: { type: number }
        detail: { type: string }
    HealthTrendPoint:
      type: object
      required: [date, score]
      properties:
        date: { type: string }
        score: { type: integer }
    HealthScore:
      type: object
      required: [generatedAt, score, label, components, trend]
      properties:
        generatedAt: { type: string, format: date-time }
        score: { type: integer }
        label:
          type: string
          enum: [excellent, good, fair, needs_work, critical]
        components:
          type: array
          items:
            $ref: "#/components/schemas/HealthComponent"
        trend:
          type: array
          items:
            $ref: "#/components/schemas/HealthTrendPoint"
    ImpactMetrics:
      type: object
      required: [clicks, impressions]
      properties:
        clicks: { type: number }
        impressions: { type: number }
        position: { type: ["number", "null"] }
    ImpactEvent:
      type: object
      required: [source, kind, completedAt]
      properties:
        source:
          type: string
          enum: [action, optimize, suggestion]
        kind: { type: string }
        label: { type: ["string", "null"] }
        completedAt: { type: string, format: date-time }
    ImpactWinItem:
      type: object
      required:
        - path
        - url
        - events
        - anchorCompletedAt
        - completionWeek
        - state
        - weeksBefore
        - weeksAfter
      properties:
        path: { type: string }
        url: { type: string }
        events:
          type: array
          items:
            $ref: "#/components/schemas/ImpactEvent"
        anchorCompletedAt: { type: string, format: date-time }
        completionWeek: { type: string }
        state:
          type: string
          enum: [measuring, improved, flat, declined]
        baseline:
          oneOf:
            - $ref: "#/components/schemas/ImpactMetrics"
            - type: "null"
        after:
          oneOf:
            - $ref: "#/components/schemas/ImpactMetrics"
            - type: "null"
        deltaClicks: { type: ["number", "null"] }
        deltaImpressions: { type: ["number", "null"] }
        deltaPosition: { type: ["number", "null"] }
        weeksBefore: { type: integer }
        weeksAfter: { type: integer }
    ImpactWins:
      type: object
      required: [generatedAt, summary, items]
      properties:
        generatedAt: { type: string, format: date-time }
        summary:
          type: object
          required: [measuring, improved, flat, declined]
          properties:
            measuring: { type: integer }
            improved: { type: integer }
            flat: { type: integer }
            declined: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ImpactWinItem"
    ImpactWeekPoint:
      type: object
      required: [weekStart, clicks, impressions]
      properties:
        weekStart: { type: string }
        clicks: { type: number }
        impressions: { type: number }
        position: { type: ["number", "null"] }
    ImpactDetail:
      type: object
      required: [path, weeks]
      properties:
        path: { type: string }
        weeks:
          type: array
          items:
            $ref: "#/components/schemas/ImpactWeekPoint"
    DigestActionRef:
      type: object
      required: [actionType, targetUrl, score]
      properties:
        actionType: { type: string }
        targetUrl: { type: string }
        title: { type: ["string", "null"] }
        score: { type: number }
        resolution: { type: ["string", "null"] }
    DigestWinRef:
      type: object
      required: [path, url, state]
      properties:
        path: { type: string }
        url: { type: string }
        state: { type: string }
        deltaClicks: { type: ["number", "null"] }
        deltaImpressions: { type: ["number", "null"] }
    DigestPayload:
      type: object
      required: [weekOf, generatedAt, health, newIssues, completed, wins, openActions]
      properties:
        weekOf: { type: string }
        generatedAt: { type: string, format: date-time }
        health:
          type: object
          required: []
          properties:
            current: { type: ["integer", "null"] }
            previous: { type: ["integer", "null"] }
            delta: { type: ["integer", "null"] }
            label: { type: ["string", "null"] }
        newIssues:
          type: object
          required: [total, byType, top]
          properties:
            total: { type: integer }
            byType:
              type: object
              additionalProperties: { type: integer }
            top:
              type: array
              items:
                $ref: "#/components/schemas/DigestActionRef"
        completed:
          type: object
          required: [total, auto, manual, top]
          properties:
            total: { type: integer }
            auto: { type: integer }
            manual: { type: integer }
            top:
              type: array
              items:
                $ref: "#/components/schemas/DigestActionRef"
        wins:
          type: object
          required: [improved, measuring, flat, declined, top]
          properties:
            improved: { type: integer }
            measuring: { type: integer }
            flat: { type: integer }
            declined: { type: integer }
            top:
              type: array
              items:
                $ref: "#/components/schemas/DigestWinRef"
        openActions: { type: integer }
    DigestItem:
      type: object
      required: [id, weekOf, createdAt, payload]
      properties:
        id: { type: integer }
        weekOf: { type: string }
        createdAt: { type: ["string", "null"], format: date-time }
        payload:
          $ref: "#/components/schemas/DigestPayload"
    DigestList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DigestItem"
    DashboardUrlItem:
      type: object
      required: [url]
      properties:
        url: { type: string }
        label: { type: ["string", "null"] }
        sublabel: { type: ["string", "null"] }
        count: { type: ["integer", "null"] }
    DashboardUrlList:
      type: object
      required: [type, total, returned, items]
      properties:
        type: { type: string }
        total: { type: integer }
        returned: { type: integer }
        items:
          type: array
          items:
            $ref: "#/components/schemas/DashboardUrlItem"
    LinkGraphNode:
      type: object
      required: [id, section, isOrphan, isDeadEnd, pagerank, inboundCount, outboundCount]
      properties:
        id: { type: string }
        title: { type: ["string", "null"] }
        section: { type: string }
        isOrphan: { type: boolean }
        isDeadEnd: { type: boolean }
        pagerank: { type: number }
        inboundCount: { type: integer }
        outboundCount: { type: integer }
        topQuery: { type: ["string", "null"] }
        position: { type: ["number", "null"] }
        impressions: { type: ["integer", "null"] }
        clicks: { type: ["integer", "null"] }
    LinkGraphEdge:
      type: object
      required: [source, target]
      properties:
        source: { type: string }
        target: { type: string }
        anchorText: { type: ["string", "null"] }
    LinkGraph:
      type: object
      required: [generatedAt, nodes, edges]
      properties:
        generatedAt: { type: string, format: date-time }
        nodes:
          type: array
          items: { $ref: "#/components/schemas/LinkGraphNode" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/LinkGraphEdge" }
    KnowledgeGraphNode:
      type: object
      required: [id, section, clusterId, pagerank, inboundCount, outboundCount, hasEmbedding]
      properties:
        id: { type: string }
        title: { type: ["string", "null"] }
        section: { type: string }
        clusterId: { type: integer }
        pagerank: { type: number }
        inboundCount: { type: integer }
        outboundCount: { type: integer }
        impressions: { type: ["integer", "null"] }
        clicks: { type: ["integer", "null"] }
        topQuery: { type: ["string", "null"] }
        hasEmbedding: { type: boolean }
    KnowledgeGraphEdge:
      type: object
      required: [source, target, kind]
      properties:
        source: { type: string }
        target: { type: string }
        kind: { type: string, enum: [link, semantic, both] }
        similarity: { type: ["number", "null"] }
    KnowledgeGraphCluster:
      type: object
      required: [id, label, size]
      properties:
        id: { type: integer }
        label: { type: string }
        size: { type: integer }
    KnowledgeGraph:
      type: object
      required: [generatedAt, nodes, edges, clusters, embeddedPages, totalPosts]
      properties:
        generatedAt: { type: string, format: date-time }
        nodes:
          type: array
          items: { $ref: "#/components/schemas/KnowledgeGraphNode" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/KnowledgeGraphEdge" }
        clusters:
          type: array
          items: { $ref: "#/components/schemas/KnowledgeGraphCluster" }
        embeddedPages: { type: integer }
        totalPosts: { type: integer }
    LinkGraphFocusSeed:
      type: object
      required:
        - url
        - section
        - pagerank
        - inboundCount
        - outboundCount
        - gscClicks
        - gscImpressions
        - hasEmbedding
      properties:
        url: { type: string }
        title: { type: ["string", "null"] }
        section: { type: string }
        pagerank: { type: number }
        inboundCount: { type: integer }
        outboundCount: { type: integer }
        gscClicks: { type: integer }
        gscImpressions: { type: integer }
        hasEmbedding: { type: boolean }
    LinkGraphFocusNeighbor:
      type: object
      required:
        - url
        - direction
        - anchorTexts
        - similarity
        - pagerank
        - gscClicks
        - gscImpressions
        - relevanceScore
        - prominenceScore
        - popularityScore
        - totalScore
      properties:
        url: { type: string }
        title: { type: ["string", "null"] }
