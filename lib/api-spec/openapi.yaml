              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KbDocument"
    post:
      operationId: addKbDocument
      tags: [kb]
      summary: Upload a knowledge base document (chunked and embedded on upload)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KbDocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbDocument"
  /kb/documents/{id}:
    delete:
      operationId: deleteKbDocument
      tags: [kb]
      summary: Remove a knowledge base document and its chunks
      parameters:
        - in: path
          name: id
          required: true
